<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octapet | En construcción</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat',sans-serif;
      background:#f7f9fc;
      color:#222;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      background:#fff;
      padding:60px 45px;
      border-radius:24px;
      box-shadow:0 20px 45px rgba(0,0,0,.08);
      text-align:center;
      max-width:650px;
      width:100%;
    }

    h1{
      font-size:3rem;
      margin-bottom:20px;
      color:#5c8df6;
    }

    h2{
      font-size:2rem;
      margin-bottom:20px;
    }

    p{
      color:#666;
      line-height:1.7;
      margin-bottom:35px;
    }

    a{
      display:inline-block;
      padding:14px 28px;
      background:#5c8df6;
      color:white;
      text-decoration:none;
      border-radius:999px;
      font-weight:700;
      transition:.25s;
    }

    a:hover{
      background:#4d7ae0;
    }

    @media(max-width:640px){

      .card{
        padding:40px 25px;
      }

      h1{
        font-size:2.2rem;
      }

      h2{
        font-size:1.6rem;
      }

    }

  </style>

</head>
<body>

<div class="card">

    <h1>🐾</h1>

    <h2>Estamos construyendo esta página</h2>

    <p>
        Muy pronto podrás conocer todos los detalles de este producto,
        sus ingredientes, beneficios y recomendaciones de uso.
    </p>

    <a href="index.html">← Volver al inicio</a>

</div>

</body>
</html>
